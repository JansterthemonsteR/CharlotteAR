<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Charlotte Historic Graveyard AR</title>

    <link rel="stylesheet" href="style.css" />

    <!-- A-Frame creates the 3D scene. -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- MindAR handles image recognition and tracking. -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script defer src="app.js"></script>
</head>

<body>

    <!-- This appears while the camera and MindAR are starting. -->
    <div id="loading-screen">
        <h1>Charlotte Historic Graveyard AR</h1>
        <p>Starting camera...</p>
    </div>

    <!-- One reusable information panel for every hotspot. -->
    <div id="info-panel" class="hidden">
        <div class="info-card">

            <button
                id="close-panel"
                type="button"
                aria-label="Close information panel"
            >
                ×
            </button>

            <p id="panel-label" class="panel-label">Historic Site</p>

            <h2 id="panel-title">Information</h2>

            <p id="panel-description">
                Historical information will appear here.
            </p>

        </div>
    </div>

    <!-- The augmented-reality scene. -->
    <a-scene
        mindar-image="
            imageTargetSrc: ./assets/targets/test-target.mind;
            autoStart: true;
        "
        embedded
        color-space="sRGB"
        renderer="
            colorManagement: true;
            physicallyCorrectLights: true;
            alpha: true;
        "
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >

        <a-assets></a-assets>

        <!-- The AR camera. -->
        <a-camera
            position="0 0 0"
            look-controls="enabled: false"
        ></a-camera>

        <!-- This detects mouse clicks and touchscreen taps. -->
        <a-entity
            cursor="rayOrigin: mouse; fuse: false"
            raycaster="objects: .clickable; far: 10000"
        ></a-entity>

        <!-- Everything inside attaches to the tracked image. -->
        <a-entity
            id="image-target"
            mindar-image-target="targetIndex: 0"
        >

            <!-- Hotspot 1 -->
            <a-circle
                id="hotspot-one"
                class="clickable hotspot"
                data-title="History of the Site"
                data-description="This temporary section introduces the history of the graveyard and explains why the site is important to Charlotte."
                radius="0.14"
                position="-0.35 0.25 0.03"
                material="
                    color: #006241;
                    opacity: 0.95;
                    transparent: true;
                "
                animation="
                    property: scale;
                    from: 1 1 1;
                    to: 1.15 1.15 1.15;
                    direction: alternate;
                    loop: true;
                    dur: 700;
                    easing: easeInOutSine;
                "
            >
                <a-text
                    value="1"
                    color="#ffffff"
                    align="center"
                    position="0 0 0.01"
                    width="0.8"
                ></a-text>
            </a-circle>

            <!-- Hotspot 2 -->
            <a-circle
                id="hotspot-two"
                class="clickable hotspot"
                data-title="People Remembered"
                data-description="This section will share information about people connected to the graveyard and the surrounding community."
                radius="0.14"
                position="0.3 0.05 0.03"
                material="
                    color: #006241;
                    opacity: 0.95;
                    transparent: true;
                "
                animation="
                    property: scale;
                    from: 1 1 1;
                    to: 1.15 1.15 1.15;
                    direction: alternate;
                    loop: true;
                    dur: 850;
                    easing: easeInOutSine;
                "
            >
                <a-text
                    value="2"
                    color="#ffffff"
                    align="center"
                    position="0 0 0.01"
                    width="0.8"
                ></a-text>
            </a-circle>

            <!-- Hotspot 3 -->
            <a-circle
                id="hotspot-three"
                class="clickable hotspot"
                data-title="Preserving the Graveyard"
                data-description="This section will explain preservation efforts and how visitors can learn more about the historic site."
                radius="0.14"
                position="-0.05 -0.3 0.03"
                material="
                    color: #006241;
                    opacity: 0.95;
                    transparent: true;
                "
                animation="
                    property: scale;
                    from: 1 1 1;
                    to: 1.15 1.15 1.15;
                    direction: alternate;
                    loop: true;
                    dur: 1000;
                    easing: easeInOutSine;
                "
            >
                <a-text
                    value="3"
                    color="#ffffff"
                    align="center"
                    position="0 0 0.01"
                    width="0.8"
                ></a-text>
            </a-circle>

        </a-entity>

    </a-scene>

</body>
</html>
